# Nginx config gop 2 ban demo tren cung 1 cong cong khai 3004.
#   /         -> VNPT (Next.js)  chay noi bo port 3005
#   /nexvio/  -> Nexvio          chay noi bo port 3006
#
# Cai dat: xem HUONG_DAN_DEPLOY.md trong repo nay.

server {
    listen 3004;
    server_name _;

    # --- VNPT (Next.js) o goc "/" ---
    location / {
        proxy_pass http://127.0.0.1:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # --- Nexvio o "/nexvio/" (giu nguyen full path, KHONG cat prefix) ---
    location /nexvio/ {
        proxy_pass http://127.0.0.1:3006;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Bat buoc de Vite dev server + HMR websocket chay duoc qua proxy
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
